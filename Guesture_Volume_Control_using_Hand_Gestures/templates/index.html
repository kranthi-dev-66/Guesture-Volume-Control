<!DOCTYPE html>
<html>

<head>

<title>Gesture Volume Control</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
margin:10px;
cursor:pointer;
border-radius:6px;
}

.start{
background:green;
color:white;
}

.stop{
background:red;
color:white;
}

.preview{
width:720px;
height:480px;
border:3px solid #4fc3f7;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
}

.preview img{
width:100%;
height:100%;
}

.camera{
font-size:80px;
color:#4fc3f7;
}

.volumeText{
font-size:24px;
margin-top:15px;
}

.chartBox{
width:720px;
margin:auto;
margin-top:30px;
}

</style>

</head>

<body>

<h1>Gesture Volume Control</h1>

<a href="/start">
<button class="start">Start</button>
</a>

<a href="/stop">
<button class="stop">Stop</button>
</a>

<br><br>

<div class="preview">

{% if running %}
<img src="/video">
{% else %}
<div class="camera">📷</div>
{% endif %}

</div>

<div class="volumeText">
Volume: <span id="vol">0</span>%
</div>

<div class="chartBox">
<canvas id="volumeChart"></canvas>
</div>

<script>

let ctx=document.getElementById("volumeChart");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
data:[],
borderColor:"#4fc3f7",
borderWidth:3,
tension:0.3,
pointRadius:2,
fill:false
}]
},
options:{
plugins:{
legend:{
display:false
}
},
scales:{
y:{
min:0,
max:100
}
}
}
});

function updateVolume(){

fetch('/volume')
.then(res=>res.json())
.then(data=>{

document.getElementById("vol").innerText=data.volume;

chart.data.labels.push("");
chart.data.datasets[0].data.push(data.volume);

if(chart.data.labels.length > 25){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
}

chart.update('none');

chart.update();

});

}

setInterval(updateVolume,300);

</script>

</body>
</html>
